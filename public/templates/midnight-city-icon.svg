<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="mc-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="8" fill="url(#mc-bg)"/>
  <!-- City skyline -->
  <g fill="#1A1A2E" stroke="#00BFFF" stroke-width="0.3">
    <rect x="2" y="20" width="10" height="40"/>
    <rect x="14" y="10" width="8" height="50"/>
    <rect x="24" y="25" width="6" height="35"/>
    <rect x="32" y="15" width="12" height="45"/>
    <rect x="46" y="8" width="8" height="52"/>
    <rect x="56" y="22" width="6" height="38"/>
  </g>
  <!-- Windows (lit) -->
  <g fill="#00BFFF" opacity="0.6">
    <rect x="5" y="25" width="2" height="2"/><rect x="5" y="30" width="2" height="2"/>
    <rect x="16" y="15" width="2" height="2"/><rect x="16" y="22" width="2" height="2"/>
    <rect x="18" y="35" width="2" height="2"/><rect x="35" y="20" width="2" height="2"/>
    <rect x="37" y="30" width="2" height="2"/><rect x="35" y="40" width="2" height="2"/>
    <rect x="48" y="12" width="2" height="2"/><rect x="48" y="20" width="2" height="2"/>
    <rect x="50" y="35" width="2" height="2"/><rect x="50" y="42" width="2" height="2"/>
  </g>
  <g fill="#FF00FF" opacity="0.5">
    <rect x="7" y="35" width="1.5" height="2"/>
    <rect x="28" y="30" width="1.5" height="2"/>
    <rect x="42" y="25" width="1.5" height="2"/>
  </g>
  <!-- Rain -->
  <g stroke="#00BFFF" stroke-width="0.4" opacity="0.3">
    <line x1="8" y1="0" x2="6" y2="15"/><line x1="18" y1="2" x2="16" y2="20"/>
    <line x1="30" y1="0" x2="28" y2="18"/><line x1="42" y1="5" x2="40" y2="25"/>
    <line x1="52" y1="3" x2="50" y2="20"/><line x1="60" y1="1" x2="58" y2="16"/>
  </g>
  <!-- Ground reflection -->
  <rect x="0" y="56" width="64" height="8" fill="#1A1A2E"/>
  <g stroke="#00BFFF" stroke-width="0.3" opacity="0.2">
    <line x1="14" y1="58" x2="14" y2="64"/>
    <line x1="32" y1="58" x2="32" y2="64"/>
    <line x1="46" y1="58" x2="46" y2="64"/>
  </g>
</svg>
