  </defs>
  <rect width="64" height="64" rx="8" fill="url(#cc-bg)"/>
  <!-- Window -->
  <rect x="12" y="8" width="40" height="32" rx="2" fill="#8FBC8F" opacity="0.4"/>
  <rect x="14" y="10" width="36" height="28" rx="1" fill="#C9C9FF" opacity="0.3"/>
  <!-- Rain on window -->
  <g stroke="#87CEEB" stroke-width="0.5" opacity="0.5">
    <line x1="18" y1="10" x2="16" y2="22"/><line x1="22" y1="12" x2="20" y2="28"/>
    <line x1="28" y1="10" x2="26" y2="24"/><line x1="34" y1="14" x2="32" y2="30"/>
    <line x1="40" y1="11" x2="38" y2="26"/><line x1="46" y1="13" x2="44" y2="28"/>
  </g>
  <!-- Window cross -->
  <line x1="32" y1="8" x2="32" y2="40" stroke="#8B7355" stroke-width="1" opacity="0.5"/>
  <line x1="12" y1="24" x2="52" y2="24" stroke="#8B7355" stroke-width="1" opacity="0.5"/>
  <!-- Teacup -->
