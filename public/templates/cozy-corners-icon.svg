  <circle cx="34" cy="53" r="3" fill="#D8A7B9" opacity="0.7"/>
  <circle cx="33" cy="52" r="0.8" fill="#8FBC8F" opacity="0.8"/>
  <circle cx="35" cy="52" r="0.8" fill="#8FBC8F" opacity="0.8"/>
