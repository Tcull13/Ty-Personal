<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="spp-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A0F0A"/>
      <stop offset="100%" stop-color="#4A3520"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="12" fill="url(#spp-bg)"/>
  <!-- Large gothic window -->
  <path d="M100 200 L100 60 C100 35 150 15 200 15 C250 15 300 35 300 60 L300 200Z" fill="#2C1810" stroke="#D4AF37" stroke-width="2"/>
  <!-- Window panes -->
  <line x1="200" y1="15" x2="200" y2="200" stroke="#D4AF37" stroke-width="1" opacity="0.5"/>
  <line x1="100" y1="100" x2="300" y2="100" stroke="#D4AF37" stroke-width="0.5" opacity="0.3"/>
  <line x1="100" y1="150" x2="300" y2="150" stroke="#D4AF37" stroke-width="0.5" opacity="0.3"/>
  <!-- Stained glass colors -->
  <path d="M100 60 C100 35 150 15 200 15 L200 100 L100 100Z" fill="#800020" opacity="0.15"/>
  <path d="M200 15 C250 15 300 35 300 60 L300 100 L200 100Z" fill="#556B2F" opacity="0.12"/>
  <path d="M100 100 L200 100 L200 150 L100 150Z" fill="#D4AF37" opacity="0.08"/>
  <path d="M200 100 L300 100 L300 150 L200 150Z" fill="#8B7355" opacity="0.1"/>
  <!-- Light beam from window -->
  <polygon points="120,200 280,200 350,300 50,300" fill="#FFD700" opacity="0.04"/>
  <!-- Two tall bookshelves -->
  <rect x="10" y="80" width="70" height="200" fill="#3E2213" rx="2"/>
  <rect x="320" y="80" width="70" height="200" fill="#3E2213" rx="2"/>
  <g stroke="#2C1810" stroke-width="1">
    <line x1="10" y1="120" x2="80" y2="120"/>
    <line x1="10" y1="160" x2="80" y2="160"/>
    <line x1="10" y1="200" x2="80" y2="200"/>
    <line x1="10" y1="240" x2="80" y2="240"/>
    <line x1="320" y1="120" x2="390" y2="120"/>
    <line x1="320" y1="160" x2="390" y2="160"/>
    <line x1="320" y1="200" x2="390" y2="200"/>
    <line x1="320" y1="240" x2="390" y2="240"/>
  </g>
  <!-- Books on left shelf -->
  <rect x="14" y="84" width="8" height="34" fill="#800020" rx="1"/>
  <rect x="24" y="88" width="6" height="30" fill="#D4AF37" rx="1"/>
  <rect x="32" y="86" width="10" height="32" fill="#556B2F" rx="1"/>
  <rect x="44" y="90" width="5" height="28" fill="#8B7355" rx="1"/>
  <rect x="14" y="124" width="12" height="34" fill="#556B2F" rx="1"/>
  <rect x="28" y="126" width="7" height="32" fill="#D4AF37" rx="1"/>
  <rect x="37" y="122" width="9" height="36" fill="#800020" rx="1"/>
  <!-- Books on right shelf -->
  <rect x="324" y="85" width="10" height="33" fill="#D4AF37" rx="1"/>
  <rect x="336" y="89" width="6" height="29" fill="#556B2F" rx="1"/>
  <rect x="344" y="83" width="8" height="35" fill="#800020" rx="1"/>
  <rect x="354" y="87" width="11" height="31" fill="#8B7355" rx="1"/>
  <!-- Candle on desk -->
  <rect x="190" y="175" width="4" height="25" fill="#FFFDD0" rx="1"/>
  <ellipse cx="192" cy="172" rx="3" ry="4" fill="#FF8C00" opacity="0.8"/>
  <ellipse cx="192" cy="170" rx="1.5" ry="3" fill="#FFD700" opacity="0.9"/>
  <!-- Candle glow -->
  <circle cx="192" cy="172" r="20" fill="#FFD700" opacity="0.06"/>
  <circle cx="192" cy="172" r="10" fill="#FFD700" opacity="0.08"/>
  <!-- Wooden desk -->
  <rect x="100" y="200" width="200" height="8" fill="#5C3A21" rx="1"/>
  <!-- Floor -->
  <rect x="0" y="240" width="400" height="60" fill="#2C1810"/>
  <g stroke="#3E2213" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="260" x2="400" y2="260"/>
    <line x1="0" y1="280" x2="400" y2="280"/>
  </g>
  <!-- Vintage paper on desk -->
  <rect x="210" y="180" width="30" height="20" fill="#FFFDD0" opacity="0.6" rx="1" transform="rotate(5 225 190)"/>
</svg>
