<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="nnp-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D0020"/>
      <stop offset="50%" stop-color="#1A0033"/>
      <stop offset="100%" stop-color="#FF1493"/>
    </linearGradient>
    <linearGradient id="nnp-sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF00FF"/>
      <stop offset="40%" stop-color="#FF1493"/>
      <stop offset="100%" stop-color="#FF6B6B"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="12" fill="url(#nnp-bg)"/>
  <!-- Grid floor -->
  <g stroke="#FF1493" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="240" x2="400" y2="240"/><line x1="0" y1="260" x2="400" y2="260"/>
    <line x1="0" y1="280" x2="400" y2="280"/><line x1="50" y1="300" x2="50" y2="230"/>
    <line x1="100" y1="300" x2="100" y2="230"/><line x1="150" y1="300" x2="150" y2="230"/>
    <line x1="200" y1="300" x2="200" y2="230"/><line x1="250" y1="300" x2="250" y2="230"/>
    <line x1="300" y1="300" x2="300" y2="230"/><line x1="350" y1="300" x2="350" y2="230"/>
  </g>
  <!-- Sunset -->
  <ellipse cx="200" cy="220" rx="120" ry="60" fill="url(#nnp-sun)" opacity="0.5"/>
  <!-- Mountains -->
  <path d="M0 220 L60 160 L120 200 L180 140 L240 190 L300 130 L350 180 L400 150 L400 300 L0 300Z" fill="#1A0033" opacity="0.6"/>
  <!-- Palm trees -->
  <g stroke="#00FFFF" stroke-width="2.5" fill="none" opacity="0.8">
    <path d="M280 200 C280 160 300 120 340 100"/>
    <path d="M280 200 C280 160 260 130 230 120"/>
    <path d="M280 200 C280 160 310 140 360 130"/>
    <path d="M280 200 L280 230"/>
  </g>
  <g stroke="#FF00FF" stroke-width="2" fill="none" opacity="0.7">
    <path d="M150 210 C150 175 165 140 195 120"/>
    <path d="M150 210 C150 175 135 150 115 140"/>
    <path d="M150 210 L150 235"/>
  </g>
  <!-- Stars -->
  <g fill="#00FFFF" opacity="0.6">
    <circle cx="30" cy="30" r="2"/><circle cx="70" cy="15" r="1.5"/>
    <circle cx="120" cy="40" r="1"/><circle cx="180" cy="20" r="2.5"/>
    <circle cx="240" cy="50" r="1.5"/><circle cx="310" cy="25" r="2"/>
    <circle cx="360" cy="45" r="1.5"/><circle cx="380" cy="15" r="1"/>
    <circle cx="50" cy="60" r="1"/><circle cx="160" cy="55" r="1.5"/>
  </g>
  <g fill="#FF00FF" opacity="0.5">
    <circle cx="90" cy="35" r="1.5"/><circle cx="200" cy="30" r="1"/>
    <circle cx="280" cy="15" r="1.5"/><circle cx="340" cy="35" r="1"/>
  </g>
  <!-- Chrome line accent -->
  <rect x="10" y="275" width="380" height="3" rx="1.5" fill="#C0C0C0" opacity="0.3"/>
  <!-- Sun reflection on grid -->
  <line x1="170" y1="240" x2="230" y2="240" stroke="#FF00FF" stroke-width="1" opacity="0.4"/>
  <line x1="185" y1="260" x2="215" y2="260" stroke="#FF00FF" stroke-width="0.8" opacity="0.3"/>
</svg>
