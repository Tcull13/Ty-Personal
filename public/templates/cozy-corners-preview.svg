    <line x1="100" y1="22" x2="95" y2="65"/>
    <line x1="130" y1="28" x2="125" y2="80"/>
    <line x1="160" y1="20" x2="155" y2="75"/>
    <line x1="190" y1="30" x2="185" y2="85"/>
    <line x1="220" y1="25" x2="215" y2="78"/>
    <line x1="250" y1="22" x2="245" y2="70"/>
    <line x1="280" y1="28" x2="275" y2="82"/>
    <line x1="310" y1="20" x2="305" y2="68"/>
    <line x1="340" y1="26" x2="335" y2="72"/>
    <line x1="70" y1="60" x2="65" y2="100"/>
