  <!-- Warm glow lamp -->
  <circle cx="300" cy="40" r="15" fill="#FFC87C" opacity="0.15"/>
  <rect x="297" y="40" width="6" height="20" fill="#8B7355"/>
  <path d="M290 40 L310 40 L305 25 L295 25Z" fill="#FFC87C" opacity="0.7"/>
  <circle cx="300" cy="30" r="3" fill="#FFD700" opacity="0.6"/>
